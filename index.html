<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Site</title>

    <!-- css file -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <!--========products parent container========-->
    <div class="products-container">
        <!-- title -->
        <h1>Mini E-Commerce Site</h1>

        <!-- 
        procuct cards container
        -->
        <div class="cards-container">
            <!-- product: 1 -->
            <div class="card-content">
                <h1>iPhone 15</h1>
                <p>$<span>999</span></p>
                <button>Add To Cart</button>
            </div>

            <!-- product: 2 -->
            <div class="card-content">
                <h1>iPhone 15</h1>
                <p>$<span>999</span></p>
                <button>Add To Cart</button>
            </div>

            <!-- product: 3 -->
            <div class="card-content">
                <h1>iPhone 15</h1>
                <p>$<span>999</span></p>
                <button>Add To Cart</button>
            </div>
        </div>

        <!-- prodcut price calculation -->
        <div class="carts-container">
            <h1>Shopping Cart</h1>

            <!-- shopping carts container-->
            <div class="shopping-carts-content">
                <!-- all shopping carts history -->
                <ul id="shopping-carts-lists">
                </ul>

                <!-- total price & buy button -->
                <p>Total: $<span>0</span></p>
                <button>Buy Now</button>
            </div>
        </div>

    </div>




    <!-- js file -->
    <script src="./script.js"></script>
</body>
</html>
